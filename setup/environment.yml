# Conda environment for the Ridge-Cal simulation study
# Usage:
#   conda env create -f environment.yml
#   conda activate ridgecal-sim
#
# This works on Linux, macOS, and Windows.

name: ridgecal-sim
channels:
  - conda-forge
  - defaults
dependencies:
  # Core R
  - r-base >=4.3
  - r-essentials

  # Statistical modeling
  - r-survival
  - r-glmnet

  # Parallel computation
  - r-furrr
  - r-future
  - r-future.apply

  # Pipeline / reproducibility
  - r-withr
  - r-yaml
  - r-here
  - r-renv

  # Data manipulation
  - r-tidyverse
  - r-data.table
  - r-magrittr

  # Reporting
  - r-knitr
  - r-rmarkdown
